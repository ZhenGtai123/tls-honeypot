services:
  proxy:
    build:
      context: .
      dockerfile: deployments/proxy.Dockerfile
    ports:
      - "8443:8443"
    depends_on:
      - nginx
    networks:
      - honeynet
    volumes:
      - ./logs:/logs
    command:
      - --listen=:8443
      - --target=nginx:443
      - --forward-https
      - --rotate-cert-interval=24h
      - --log-dir=/logs
    restart: unless-stopped

  nginx:
    image: nginx:latest
    restart: unless-stopped
    depends_on:
      - wordpress
    networks:
      - honeynet
    volumes:
      - ./honeypot/wordpress-https-vurn/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./testdata:/etc/nginx/certs:ro

  wordpress:
    image: wordpress:6.3-php8.2-apache
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - honeynet
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress_password
      # Set WP_HOME and WP_SITEURL to the VM's public IP before deploying.
      # Use https://localhost:8443 for local testing.
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'https://localhost:8443');
        define('WP_SITEURL', 'https://localhost:8443');
    volumes:
      - wordpress_data:/var/www/html
      - ./honeypot/wordpress-https-vurn/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro

  db:
    image: mysql:8.4
    restart: unless-stopped
    networks:
      - honeynet
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql

networks:
  honeynet:
    driver: bridge

volumes:
  db_data:
  wordpress_data:
