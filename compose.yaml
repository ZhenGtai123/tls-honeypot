# Local two-stack dev — everything in Docker.
# For VM deployment (proxies on host) use compose.split.yaml + proxy-start.sh.
#
#   attacker --[TLS A]--> proxy --[TLS B]--> nginx --[HTTP]--> wordpress --> db
#
# TLS A: proxy presents its rotating cert to the attacker (MitM, invisible).
# TLS B: proxy connects to nginx using the testdata self-signed cert.
#
# Vulnerable stack  : https://localhost:8443
# Hardened stack    : https://localhost:8444
#
# Run:  docker compose up -d --build

x-proxy-build: &proxy-build
  build:
    context: .
    dockerfile: deployments/proxy.Dockerfile
  restart: unless-stopped

services:
  # ---- shared: generate the backend TLS cert (TLS B, proxy->nginx leg) into
  # ./testdata if absent, so a fresh clone/VM boots without a manual openssl
  # step. Attackers never see this cert; the proxy skips verification. ----
  certgen:
    image: alpine/openssl:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /certs/cert.pem ] && [ -f /certs/key.pem ]; then
          echo "[certgen] certs present, skipping"; exit 0
        fi
        echo "[certgen] generating self-signed backend cert"
        openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
          -subj "/CN=honeypot-backend" \
          -keyout /certs/key.pem -out /certs/cert.pem
    volumes:
      - ./testdata:/certs

  # ============ VULNERABLE stack ============
  proxy-vuln:
    <<: *proxy-build
    ports:
      - "8443:8443"
    depends_on: [nginx-vuln]
    networks: [edge-vuln]
    volumes:
      - ./logs/vuln:/logs
    command:
      - --listen=:8443
      - --target=nginx-vuln:443
      - --forward-https
      - --rotate-cert-interval=24h
      - --cert-cn=sys-admin.internal
      - --experiment-group=vuln
      - --log-dir=/logs

  nginx-vuln:
    image: nginx:latest
    restart: unless-stopped
    depends_on:
      certgen:
        condition: service_completed_successfully
      wp-vuln:
        condition: service_started
    networks: [edge-vuln, back-vuln]
    volumes:
      - ./honeypot/wordpress-https-vurn/nginx/vuln.conf:/etc/nginx/conf.d/default.conf:ro
      - ./testdata:/etc/nginx/certs:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
          pids: 100

  # Vulnerable WordPress: PHP 7.4 (EOL), WP 5.9, debug on, permissive uploads.
  wp-vuln:
    # image: wordpress:5.9-php7.4-apache
    build:
      context: .
      dockerfile: deployments/wp-vuln.Dockerfile
    restart: unless-stopped
    depends_on: [db-vuln]
    networks: [back-vuln]
    environment:
      WORDPRESS_DB_HOST: db-vuln:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress_password
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME',          'https://localhost:8443');
        define('WP_SITEURL',       'https://localhost:8443');
        define('WP_DEBUG',         true);
        define('WP_DEBUG_DISPLAY', true);
        define('WP_DEBUG_LOG',     true);
    volumes:
      - ./honeypot/wordpress-https-vurn/wp_vuln_data:/var/www/html
      - ./honeypot/wordpress-https-vurn/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
          pids: 200

  db-vuln:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    networks: [back-vuln]
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_vuln_data:/var/lib/mysql
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - SYS_NICE
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
          pids: 200

  # ============ HARDENED stack ============
  proxy-hardened:
    <<: *proxy-build
    ports:
      - "8444:8443"
    depends_on: [nginx-hardened]
    networks: [edge-hardened]
    volumes:
      - ./logs/hardened:/logs
    command:
      - --listen=:8443
      - --target=nginx-hardened:443
      - --forward-https
      - --rotate-cert-interval=24h
      - --cert-cn=fge-integration-test.internal.coralset.com
      - --experiment-group=hardened
      - --log-dir=/logs

  nginx-hardened:
    image: nginx:latest
    restart: unless-stopped
    depends_on:
      certgen:
        condition: service_completed_successfully
      wp-hardened:
        condition: service_started
    networks: [edge-hardened, back-hardened]
    volumes:
      - ./honeypot/wordpress-https-hardened/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./testdata:/etc/nginx/certs:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
          pids: 100

  # Hardened WordPress: PHP 8.3, WP 6.7, debug off, tight uploads, file editing disabled.
  wp-hardened:
    image: wordpress:6.7-php8.3-apache
    restart: unless-stopped
    depends_on: [db-hardened]
    networks: [back-hardened]
    environment:
      WORDPRESS_DB_HOST: db-hardened:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress_password
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME',             'https://localhost:8444');
        define('WP_SITEURL',          'https://localhost:8444');
        define('WP_DEBUG',            false);
        define('DISALLOW_FILE_EDIT',  true);
        define('WP_AUTO_UPDATE_CORE', true);
    volumes:
      - ./honeypot/wordpress-https-hardened/wp_hardened_data:/var/www/html
      - ./honeypot/wordpress-https-hardened/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
          pids: 200

  db-hardened:
    image: mysql:8.4
    restart: unless-stopped
    networks: [back-hardened]
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./honeypot/wordpress-https-hardened/db_hardened_data:/var/lib/mysql
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - SYS_NICE
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
          pids: 200

networks:
  edge-vuln:
    driver: bridge
  back-vuln:
    driver: bridge
    internal: true
  edge-hardened:
    driver: bridge
  back-hardened:
    driver: bridge
    internal: true

volumes:
  wp_vuln_data:
  db_vuln_data:
  wp_hardened_data:
  db_hardened_data:
